<body class="bg-medical-gradient min-h-screen flex items-center justify-center p-6 font-body text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed">

<!-- Login Container -->
<main class="relative z-10 w-full max-w-lg">
<div class="glass-panel p-8 md:p-12 rounded-[2rem] shadow-2xl shadow-primary/5 flex flex-col items-center">
<!-- Logo & Title -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center mb-4 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary text-4xl" style="font-variation-settings: 'FILL' 1;">medical_services</span>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-primary">MediQueue</h1>
<p class="font-label text-on-surface-variant mt-1 text-sm font-medium">Clinical Portal Authorization</p>
</div>
<!-- Role Selector Tabs -->
<div class="w-full grid grid-cols-2 p-1.5 bg-surface-container-high rounded-xl mb-8">
<button class="py-2.5 rounded-lg text-sm font-semibold transition-all duration-300 bg-surface-container-lowest text-primary shadow-sm">
                    Medical Staff
                </button>
<button class="py-2.5 rounded-lg text-sm font-medium text-on-surface-variant hover:text-on-surface transition-all duration-300">
                    Administrator
                </button>
</div>
<!-- Form -->
<form class="w-full space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider px-1" for="email">
                        Institutional Email
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors text-xl">alternate_email</span>

</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="password">
                            Secure Key
                        </label>
<a class="text-xs font-semibold text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">

<input class="w-full pl-12 pr-12 py-4 bg-surface-container-high border-none rounded-xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 font-medium" id="password" placeholder="••••••••" type="password"/>

<span class="text-[11px] font-semibold text-on-surface-variant uppercase tracking-tighter">System Health: Optimal</span>
</div>
<p class="text-[11px] font-medium text-on-surface-variant/60">v2.4.0 Clinical Alpha</p>
</div>
</main>
<!-- Role Based Visual Cues (Floating) -->
<div class="fixed bottom-10 right-10 hidden xl:flex flex-col items-end gap-3 pointer-events-none">
<div class="px-4 py-3 bg-surface-container-lowest/80 backdrop-blur-md rounded-2xl border border-surface-container-highest shadow-xl flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-container text-lg">psychology</span>
</div>
<div>
<p class="text-[10px] font-bold text-on-surface-variant uppercase">Smart Routing</p>
<p class="text-xs text-on-surface font-medium italic">Redirecting to Surgeon Dashboard...</p>
</div>
</div>
</div>
    <script src="assets/js/api.js"></script>
    <script>
        const loginForm = document.querySelector('form');
        const roleButtons = document.querySelectorAll('.grid button');
        let selectedRole = 'doctor';

        roleButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                roleButtons.forEach(b => b.classList.remove('bg-surface-container-lowest', 'text-primary', 'shadow-sm'));
                btn.classList.add('bg-surface-container-lowest', 'text-primary', 'shadow-sm');
                selectedRole = btn.textContent.trim().toLowerCase().includes('staff') ? 'doctor' : 'receptionist';
            });
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = loginForm.querySelector('button[type="submit"]');
            
            btn.innerHTML = 'Signing In... <span class="material-symbols-outlined animate-spin">refresh</span>';
            btn.disabled = true;

            try {
                const res = await api.post('/auth/login', { email, password });
                if (res.error) {
                    alert(res.error);
                } else {
                    storage.setToken(res.accessToken);
                    storage.setUser(res.user);
                    
                    if (res.user.role === 'doctor') window.location.href = 'doctor.html';
                    else if (res.user.role === 'receptionist') window.location.href = 'receptionist.html';
                    else window.location.href = 'patient.html';
                }
            } catch (err) {
                alert('Connection failed. Error: ' + err.message);
            } finally {
                btn.innerHTML = 'Sign In <span class="material-symbols-outlined">arrow_forward</span>';
                btn.disabled = false;
            }
        });
    </script>
</body></html>
