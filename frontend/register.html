<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register | MediQueue Clinical Portal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#004ac6",
                    "surface-container-high": "#e6e8ea",
                    "surface-container-highest": "#e0e3e5",
                    "on-primary": "#ffffff",
                    "secondary": "#006a61",
                    "surface-container-lowest": "#ffffff",
                    "background": "#f7f9fb",
                    "on-surface": "#191c1e",
                    "on-surface-variant": "#434655",
                    "primary-container": "#2563eb",
                    "tertiary": "#3e3fcc",
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(224, 227, 229, 0.2);
        }
        .bg-medical-gradient {
            background: radial-gradient(circle at 0% 0%, #e1e0ff 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, #89f5e7 0%, transparent 50%),
                        #f7f9fb;
        }
    </style>
</head>
<body class="bg-medical-gradient min-h-screen flex items-center justify-center p-6 font-body text-on-surface">
<!-- Background Decoration Elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[5%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute top-[60%] -right-[10%] w-[50%] h-[50%] bg-secondary/10 rounded-full blur-[100px]"></div>
</div>

<main class="relative z-10 w-full max-w-lg">
<div class="glass-panel p-8 md:p-12 rounded-[2rem] shadow-2xl shadow-primary/5 flex flex-col items-center">
<!-- Logo & Title -->
<div class="flex flex-col items-center mb-8">
<div class="w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center mb-4 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary text-4xl" style="font-variation-settings: 'FILL' 1;">medical_services</span>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-primary">MediQueue</h1>
<p class="font-label text-on-surface-variant mt-1 text-sm font-medium">Create New Account</p>
</div>

<!-- Role Selector Tabs -->
<div class="w-full grid grid-cols-3 p-1.5 bg-surface-container-high rounded-xl mb-6">
<button class="py-2.5 rounded-lg text-sm font-semibold transition-all duration-300 bg-surface-container-lowest text-primary shadow-sm" data-role="patient">
                    Patient
                </button>
<button class="py-2.5 rounded-lg text-sm font-medium text-on-surface-variant hover:text-on-surface transition-all duration-300" data-role="doctor">
                    Doctor
                </button>
<button class="py-2.5 rounded-lg text-sm font-medium text-on-surface-variant hover:text-on-surface transition-all duration-300" data-role="receptionist">
                    Staff
                </button>
</div>

<!-- Form -->
<form class="w-full space-y-5">
    <div class="relative group">
        <input class="w-full px-5 py-4 bg-surface-container-high border-none rounded-xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 font-medium" id="name" placeholder="Full Name" type="text" required/>
    </div>
    <div class="relative group">
        <input class="w-full px-5 py-4 bg-surface-container-high border-none rounded-xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 font-medium" id="email" placeholder="Email Address" type="email" required/>
    </div>
    <div class="relative group">
        <input class="w-full px-5 py-4 bg-surface-container-high border-none rounded-xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 font-medium" id="phone" placeholder="Phone Number" type="tel" required/>
    </div>
    <div class="relative group">
        <input class="w-full px-5 py-4 bg-surface-container-high border-none rounded-xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 font-medium" id="password" placeholder="Password" type="password" required/>
    </div>
    
    <button class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold text-lg rounded-xl shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all duration-300 flex items-center justify-center gap-2 group" type="submit">
        Register Account
        <span class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
    </button>
</form>

<!-- Footer Links & Tech Info -->
<div class="mt-8 w-full pt-6 border-t border-surface-container-highest flex flex-col items-center gap-4">
<a class="text-sm font-semibold text-primary hover:text-primary-container transition-colors" href="login.html">Already have an account? Sign In</a>
</div>
</div>
</main>

    <script src="assets/js/api.js"></script>
    <script>
        const regForm = document.querySelector('form');
        const roleButtons = document.querySelectorAll('.grid button');
        let selectedRole = 'patient';

        roleButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                roleButtons.forEach(b => {
                    b.classList.remove('bg-surface-container-lowest', 'text-primary', 'shadow-sm');
                    b.classList.add('text-on-surface-variant');
                });
                btn.classList.add('bg-surface-container-lowest', 'text-primary', 'shadow-sm');
                btn.classList.remove('text-on-surface-variant');
                selectedRole = btn.getAttribute('data-role');
            });
        });

        regForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const btn = regForm.querySelector('button[type="submit"]');
            
            btn.innerHTML = 'Creating Account... <span class="material-symbols-outlined animate-spin">refresh</span>';
            btn.disabled = true;

            try {
                const res = await api.post('/auth/register', { name, email, phone, password, role: selectedRole });
                if (res.error) {
                    alert(res.error);
                } else {
                    alert('Registration successful! Redirecting to login...');
                    window.location.href = 'login.html';
                }
            } catch (err) {
                alert('Connection failed. Error: ' + err.message);
            } finally {
                btn.innerHTML = 'Register Account <span class="material-symbols-outlined">arrow_forward</span>';
                btn.disabled = false;
            }
        });
    </script>
</body></html>
