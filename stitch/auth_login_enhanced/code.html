<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | MediQueue Clinical Portal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed-variant": "#2f2ebe",
                    "tertiary-fixed": "#e1e0ff",
                    "surface-variant": "#e0e3e5",
                    "tertiary": "#3e3fcc",
                    "primary": "#004ac6",
                    "surface-container-high": "#e6e8ea",
                    "on-primary-container": "#eeefff",
                    "surface-container-highest": "#e0e3e5",
                    "on-primary": "#ffffff",
                    "secondary-fixed": "#89f5e7",
                    "on-secondary-container": "#006f66",
                    "on-secondary": "#ffffff",
                    "secondary-container": "#86f2e4",
                    "tertiary-container": "#585be6",
                    "on-secondary-fixed-variant": "#005049",
                    "inverse-on-surface": "#eff1f3",
                    "surface": "#f7f9fb",
                    "surface-container-low": "#f2f4f6",
                    "inverse-primary": "#b4c5ff",
                    "background": "#f7f9fb",
                    "inverse-surface": "#2d3133",
                    "secondary": "#006a61",
                    "tertiary-fixed-dim": "#c0c1ff",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-fixed": "#00201d",
                    "on-tertiary-fixed": "#07006c",
                    "outline": "#737686",
                    "on-error": "#ffffff",
                    "error-container": "#ffdad6",
                    "on-error-container": "#93000a",
                    "on-primary-fixed": "#00174b",
                    "surface-container": "#eceef0",
                    "on-primary-fixed-variant": "#003ea8",
                    "secondary-fixed-dim": "#6bd8cb",
                    "surface-bright": "#f7f9fb",
                    "error": "#ba1a1a",
                    "outline-variant": "#c3c6d7",
                    "primary-fixed": "#dbe1ff",
                    "surface-dim": "#d8dadc",
                    "on-background": "#191c1e",
                    "on-surface": "#191c1e",
                    "on-tertiary-container": "#f1eeff",
                    "surface-tint": "#0053db",
                    "primary-fixed-dim": "#b4c5ff",
                    "on-surface-variant": "#434655",
                    "primary-container": "#2563eb",
                    "on-tertiary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            },
            "animation": {
                'blob': "blob 25s infinite",
                'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                'fade-in': 'fadeIn 1s ease-out forwards',
            },
            "keyframes": {
                blob: {
                    "0%": { transform: "translate(0px, 0px) scale(1)" },
                    "33%": { transform: "translate(30px, -50px) scale(1.1)" },
                    "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
                    "100%": { transform: "translate(0px, 0px) scale(1)" },
                },
                fadeInUp: {
                    '0%': { opacity: '0', transform: 'translateY(20px)' },
                    '100%': { opacity: '1', transform: 'translateY(0)' },
                },
                fadeIn: {
                    '0%': { opacity: '0' },
                    '100%': { opacity: '1' },
                }
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .bg-medical-gradient {
            background: #f7f9fb;
            position: relative;
            overflow: hidden;
        }
        .animate-delay-100 { animation-delay: 100ms; }
        .animate-delay-200 { animation-delay: 200ms; }
        .animate-delay-300 { animation-delay: 300ms; }
        .animate-delay-400 { animation-delay: 400ms; }
    </style>
</head>
<body class="bg-medical-gradient min-h-screen flex items-center justify-center p-6 font-body text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Premium Ambient Background Effect -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<!-- Moving Organic Blobs -->
<div class="absolute top-0 -left-4 w-96 h-96 bg-primary/10 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob"></div>
<div class="absolute top-0 -right-4 w-96 h-96 bg-secondary/15 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob animation-delay-2000"></div>
<div class="absolute -bottom-8 left-20 w-96 h-96 bg-tertiary/10 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob animation-delay-4000"></div>
<!-- Subtle Grid Overlay -->
<div class="absolute inset-0 bg-[url('https://grainy-gradients.vercel.app/noise.svg')] opacity-[0.03] contrast-150 brightness-100"></div>
<img class="absolute inset-0 w-full h-full object-cover opacity-5 mix-blend-overlay grayscale transition-opacity duration-1000" data-alt="Modern minimal clinic hallway" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCjdrmndM23_ogjW767zrLn9hhVbBPBIDUYaZ3BXvwaMZWkFVUuCIqXyRWAgwWDauGsmF8Dlt5WquY84lJ5vw9XACfMdVNOEIw94P8LFsmMAqDzzbUIu1I94H5oNeDfCSo0roP7kgPk0_2WAkQgH8kWMEeltc61FZQXVVO-pqsNf3j6B2k5MEIO_hDQgAlrxwiY8KvHydh-2L1f562p3E0eDJmo9jeDtVHl72r2VDR2m4jY3wvMq1KWQVeRYSar7qJkuie07rNJW_Q"/>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-lg animate-fade-in-up">
<div class="glass-panel p-8 md:p-12 rounded-[2.5rem] shadow-[0_32px_64px_-16px_rgba(0,74,198,0.08)] flex flex-col items-center">
<!-- Logo & Title -->
<div class="flex flex-col items-center mb-10 opacity-0 animate-fade-in-up animate-delay-100">
<div class="w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center mb-4 shadow-xl shadow-primary/15 transition-transform hover:scale-105 duration-500">
<span class="material-symbols-outlined text-on-primary text-4xl" style="font-variation-settings: 'FILL' 1;">medical_services</span>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-primary">MediQueue</h1>
<p class="font-label text-on-surface-variant mt-1 text-sm font-medium">Clinical Portal Authorization</p>
</div>
<!-- Role Selector Tabs -->
<div class="w-full grid grid-cols-2 p-1.5 bg-surface-container-high/50 rounded-2xl mb-8 opacity-0 animate-fade-in-up animate-delay-200">
<button class="py-2.5 rounded-xl text-sm font-semibold transition-all duration-300 bg-surface-container-lowest text-primary shadow-sm">
                Medical Staff
            </button>
<button class="py-2.5 rounded-xl text-sm font-medium text-on-surface-variant hover:text-on-surface transition-all duration-300">
                Administrator
            </button>
</div>
<!-- Form -->
<form class="w-full space-y-6 opacity-0 animate-fade-in-up animate-delay-300">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-xs font-bold text-on-surface-variant/80 uppercase tracking-widest px-1" for="email">
                    Institutional Email
                </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors text-xl">alternate_email</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low/50 border-2 border-transparent rounded-2xl text-on-surface placeholder:text-outline/60 focus:ring-0 focus:border-primary/20 focus:bg-surface-container-lowest transition-all duration-500 font-medium" id="email" placeholder="dr.smith@mediqueue.clinic" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-bold text-on-surface-variant/80 uppercase tracking-widest" for="password">
                        Secure Key
                    </label>
<a class="text-xs font-semibold text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors text-xl">lock</span>
</div>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-low/50 border-2 border-transparent rounded-2xl text-on-surface placeholder:text-outline/60 focus:ring-0 focus:border-primary/20 focus:bg-surface-container-lowest transition-all duration-500 font-medium" id="password" placeholder="••••••••" type="password"/>
<div class="absolute inset-y-0 right-0 pr-4 flex items-center">
<button class="text-on-surface-variant/60 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center space-x-2 px-1 py-1">
<input class="w-5 h-5 rounded-lg border-outline-variant text-primary focus:ring-primary/20 focus:ring-offset-0 transition-all cursor-pointer" id="remember" type="checkbox"/>
<label class="text-sm text-on-surface-variant font-medium select-none cursor-pointer" for="remember">Stay signed in for this shift</label>
</div>
<!-- Submit Button -->
<button class="w-full py-4 bg-primary text-on-primary font-headline font-bold text-lg rounded-2xl shadow-xl shadow-primary/20 hover:shadow-primary/30 hover:-translate-y-0.5 active:scale-95 transition-all duration-300 flex items-center justify-center gap-2 group" type="submit">
                Sign In
                <span class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-10 w-full pt-8 border-t border-surface-container-highest/50 flex flex-col items-center gap-4 opacity-0 animate-fade-in animate-delay-400">
<div class="flex items-center gap-6 text-sm font-medium text-on-surface-variant/80">
<a class="hover:text-primary transition-colors" href="#">Request Access</a>
<span class="w-1.5 h-1.5 rounded-full bg-outline-variant/40"></span>
<a class="hover:text-primary transition-colors" href="#">Security Standards</a>
</div>
<div class="flex gap-4 mt-2">
<div class="flex items-center gap-1.5 px-3 py-1 bg-surface-container-low/60 rounded-full backdrop-blur-sm">
<div class="w-2 h-2 rounded-full bg-secondary animate-pulse"></div>
<span class="text-[10px] font-bold text-on-surface-variant tracking-widest uppercase">JWT Secure</span>
</div>
<div class="flex items-center gap-1.5 px-3 py-1 bg-surface-container-low/60 rounded-full backdrop-blur-sm">
<span class="text-[10px] font-bold text-on-surface-variant tracking-widest uppercase italic">Axios-Native</span>
</div>
</div>
</div>
</div>
<!-- System Status Bar -->
<div class="mt-8 flex justify-between items-center px-4 opacity-0 animate-fade-in animate-delay-400">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary text-sm" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider">System Health: Optimal</span>
</div>
<p class="text-[11px] font-bold text-on-surface-variant/60 tracking-wider">v2.4.0 Clinical Alpha</p>
</div>
</main>
<!-- Floating Role Cues -->
<div class="fixed bottom-10 right-10 hidden xl:flex flex-col items-end gap-3 pointer-events-none opacity-0 animate-fade-in animate-delay-400">
<div class="px-5 py-4 bg-surface-container-lowest/90 backdrop-blur-xl rounded-[1.5rem] border border-white/50 shadow-2xl flex items-center gap-4 transform hover:scale-105 transition-transform duration-500">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center shadow-inner">
<span class="material-symbols-outlined text-on-secondary-container text-xl">psychology</span>
</div>
<div>
<p class="text-[10px] font-black text-secondary tracking-widest uppercase mb-0.5">Smart Routing</p>
<p class="text-xs text-on-surface font-semibold">Ready for Surgeon Dashboard...</p>
</div>
</div>
</div>
</body></html>
